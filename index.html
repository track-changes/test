<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
</head>
<body>

<button id="my-button" style="width:200px; height:200px;">Нажми меня</button>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  document.getElementById('my-button').addEventListener('click', function() {
    if (window.Telegram.WebApp.isHapticFeedbackSupported()) {
      Telegram.WebApp.TapticEngine.impactOccurred('medium');
    }
  });
</script>

</body>
</html>
