<!DOCTYPE html>
<html>
<head>
    <title>Haptic Feedback Example</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function sendHapticFeedback() {
            $.ajax({
                url: 'https://api.telegram.org/7361056451:AAFy4hdDceQJXdYFwhIm6g7L9D54mjH-dFY/sendMessage',
                type: 'POST',
                data: {
                    chat_id: 'YOUR_CHAT_ID',
                    text: 'Haptic Feedback Sent!'
                },
                success: function(resp) {
                    console.log('Haptic Feedback sent successfully!');
                },
                error: function(err) {
                    console.error('Error sending Haptic Feedback:', err);
                }
            });
        }

        $(document).ready(function() {
            $('#sendFeedbackBtn').click(function() {
                sendHapticFeedback();
            });
        });
    </script>
</head>
<body>
    <h1>Haptic Feedback Example</h1>
    <button id="sendFeedbackBtn">Send Haptic Feedback</button>
</body>
</html>
